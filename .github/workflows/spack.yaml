---
name: Build Spack env

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-spack-env:
    strategy:
      fail-fast: false
      matrix:
        env:
          - dev-matplotlib.yaml
        os: [ubuntu-26.04]
    runs-on: ${{matrix.os}}
    permissions:
      packages: write  # Required to push to registry
    steps:
      - name: Checkout built branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Spack
        uses: spack/setup-spack@16b756799ede8b28951287f89bcd3fdb32ec1ca3  # v3.0.0
        with:
          spack_ref: v1.2.1
          buildcache: true
      - name: Install
        shell: spack-bash {0}
        env:
          GITHUB_USER: ${{github.actor}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          spack env create . ${{matrix.env}}
          spack --env . repo update
          spack --env . buildcache update-index local-buildcache
          spack --env . concretize --test root --quiet
          spack --env . spec --install-status --namespaces
          spack --env . install --test root --use-buildcache package:never,dependencies:auto
