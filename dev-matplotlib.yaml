---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
    sandbox:
      enable: false
      allow_network: false
      allow_read:
        - /
      allow_write:
        - /home/runner
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/tpadioleau/dev-spack-ubuntu-26.04
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
  packages:
    all:
      require:
        - 'target=x86_64'
      prefer:
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@15.2'
    cxx:
      require: 'gcc@15.2'
    fortran:
      require: 'gcc@15.2'
    py-dask:
      prefer:
        - '~dataframe'
    py-pandas:
      prefer: 
        - '~performance'
  repos:
    builtin:
      branch: releases/v2026.06
  specs:
    - 'py-matplotlib@3.11'
