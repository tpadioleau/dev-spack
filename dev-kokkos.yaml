---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
    sandbox:
      enable: true
      allow_network: false
      allow_read:
        - /
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/tpadioleau/kokkos-reproducer
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
  packages:
    all:
      require:
        - 'target=x86_64'
      prefer:
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@15.2'
    cxx:
      require: 'gcc@15.2'
    fortran:
      require: 'gcc@15.2'
  repos:
    builtin:
      branch: releases/v2026.06
  specs:
    - 'kokkos@5.1.1~aggressive_vectorization~cmake_lang+complex_align~cuda~debug~debug_bounds_check+deprecated_code~hip_relocatable_device_code~hpx~hwloc~ipo~openmp~pic~rocm+serial+shared~sycl~tests~threads~tuning~wrapper build_system=cmake build_type=Release cxxstd=20 generator=make intel_gpu_arch=none'
