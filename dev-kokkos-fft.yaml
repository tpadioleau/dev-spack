---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
    sandbox:
      enable: true
      allow_network: false
      allow_read:
        - /
  packages:
    all:
      require:
        - 'target=x86_64'
      prefer:
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@15.2'
    cxx:
      require: 'gcc@15.2'
    fortran:
      require: 'gcc@15.2'
  repos:
    builtin:
      tag: v2026.06.0
  specs:
    - 'gcc@15.2'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@4.2'
    - 'doxygen@1.17'
    - 'fftw@3.3 precision=float,double'
    - 'googletest@1.17 +gmock'
    - 'kokkos@5.1'
    - 'ninja@1.13'
    - 'py-gcovr@8.6'
