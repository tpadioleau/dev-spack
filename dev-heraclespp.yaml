---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
    sandbox:
      enable: true
      allow_network: false
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/tpadioleau/dev-spack-ubuntu-26.04
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
  packages:
    all:
      require:
        - 'target=x86_64'
      prefer:
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@15.2'
    cxx:
      require: 'gcc@15.2'
    fortran:
      require: 'gcc@15.2'
    mpi:
      require: 'openmpi@5.0'
  repos:
    builtin:
      tag: v2026.06.0
  specs:
    - 'gcc@15.2'
    - 'benchmark@1.9 ~performance_counters'
    - 'cmake@4.2'
    - 'doxygen@1.17'
    - 'googletest@1.17'
    - 'hdf5@1.14 +mpi'
    - 'kokkos@5.1'
    - 'kokkos-tools@git.3d33d0a783c5321d6981b3b4e43d3c157d2ca887=develop'
    - 'mpi'
    - 'ninja@1.13'
    - 'paraconf@1.0'
    - 'pdi@1.11'
    - 'pdiplugin-decl-hdf5@1.11 +mpi'
    - 'pdiplugin-mpi@1.11'
    - 'pdiplugin-set-value@1.11'
    - 'pdiplugin-trace@1.11'
    - 'py-h5py'
    - 'py-matplotlib'
    - 'py-numpy'
    - 'py-pyyaml'
    - 'py-scipy'
