---
spack:
  concretizer:
    reuse: false
    unify: true
  config:
    install_tree:
      padded_length: 128
    sandbox:
      enable: true
      allow_network: false
      allow_read:
        - /
      allow_write:
        - /home/runner
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/tpadioleau/dev-spack-ubuntu-26.04
      binary: true
      signed: false
      access_pair:
        id_variable: GITHUB_USER
        secret_variable: GITHUB_TOKEN
  packages:
    all:
      require:
        - 'target=x86_64'
      prefer:
        - '~cuda'
        - '~rocm'
        - '~openmp'
        - '~mpi'
        - '~fortran'
    c:
      require: 'gcc@15.2'
    cxx:
      require: 'gcc@15.2'
    fortran:
      require: 'gcc@15.2'
    py-dask:
      prefer:
        - '~dataframe'
    py-pandas:
      prefer: 
        - '~performance'
  repos:
    patches:
      git: https://github.com/gyselax/spack.git
      branch: releases/v2026.06
    builtin:
      tag: v2026.06.0
  specs:
    - 'gcc@15.2'
    - 'cmake@4.2'
    - 'ddc@0.15 +fft +pdi +splines'
    - 'ginkgo@1.11'
    - 'gmgpolar@2.3'
    - 'googletest@1.17 +gmock'
    - 'kokkos@5.1'
    - 'kokkos-kernels@5.1'
    - 'kokkos-tools@git.3d33d0a783c5321d6981b3b4e43d3c157d2ca887=develop'
    - 'koliop@0.2'
    - 'ninja@1.13'
    - 'openblas@0.3'
    - 'openmpi@5.0'
    - 'paraconf@1.0'
    - 'pdi@1.11'
    - 'pdiplugin-decl-hdf5@1.11 +mpi'
    - 'pdiplugin-mpi@1.11'
    - 'pdiplugin-set-value@1.11'
    - 'pdiplugin-trace@1.11'
    - 'py-dask@2026.3'
    - 'py-h5py@3.16'
    - 'py-imageio@2.37'
    - 'py-matplotlib@3.11 ^freetype@2.14.1'
    - 'py-numpy@2.4'
    - 'py-pyyaml@6.0'
    - 'py-scipy@1.17'
    - 'py-xarray@2026.4'
